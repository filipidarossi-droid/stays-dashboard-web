<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stays — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css" />
  <script defer src="config.js"></script>
  <script defer src="assets/app.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="left-section">
      <div class="unit-selector">
        <select id="unit-select" class="unit-dropdown">
          <option value="ALL">Todas as unidades</option>
        </select>
      </div>
      <div class="brand">Stays — Dashboard</div>
    </div>
    <div class="live">
      <span class="dot"></span>
      <span>ao vivo</span>
      <small id="last-updated" title="última atualização"></small>
    </div>
  </header>

  <main class="container">
    <section class="cards">
      <div class="card" id="card-ate-hoje">
        <h3>Até hoje</h3>
        <div class="big" id="ate-hoje-pct">--%</div>
        <div class="sub" id="ate-hoje-frac">--/--</div>
      </div>

      <div class="card" id="card-futuro">
        <h3>Futuro</h3>
        <div class="big" id="futuro-pct">--%</div>
        <div class="sub" id="futuro-frac">--/--</div>
      </div>

      <div class="card" id="card-fechamento">
        <h3>Fechamento</h3>
        <div class="big" id="fechamento-pct">--%</div>
        <div class="sub" id="fechamento-frac">--/--</div>
      </div>

      <div class="card" id="card-repasse">
        <h3>Repasse (mês)</h3>
        <div class="big" id="repasse-total">--</div>
        <div class="sub" id="repasse-obs">—</div>
      </div>
    </section>

    <section class="calendar">
      <div class="cal-header">
        <div>
          <h3 id="cal-title">Calendário</h3>
          <small>🚨 aparece quando passam 3+ dias sem reserva (até hoje)</small>
        </div>
        <div class="toolbar">
          <button id="btn-refresh" title="Atualizar agora">↻</button>
        </div>
      </div>
      <div id="cal-strip" class="strip"></div>
      <div id="error" class="error hidden"></div>
    </section>
  </main>

  <footer class="footer">
    <span>Feito para acompanhamento rápido. Atualiza sozinho a cada 60s.</span>
  </footer>
</body>
</html>
