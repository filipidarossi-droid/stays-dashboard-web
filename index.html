<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stays Dashboard</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Stays Dashboard</h1>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span id="lastUpdate">Carregando...</span>
            </div>
        </header>

        <div class="error-message" id="errorMessage" style="display: none;">
            <span>⚠️ Erro ao atualizar dados. Tentando novamente...</span>
        </div>

        <div class="cards-grid">
            <div class="card">
                <div class="card-header">
                    <h3>Até Hoje</h3>
                    <span class="card-icon">📊</span>
                </div>
                <div class="card-content">
                    <div class="percentage" id="ateHojePerc">--%</div>
                    <div class="fraction" id="ateHojeFrac">--/--</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Futuro</h3>
                    <span class="card-icon">🔮</span>
                </div>
                <div class="card-content">
                    <div class="percentage" id="futuroPerc">--%</div>
                    <div class="fraction" id="futuroFrac">--/--</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Fechamento</h3>
                    <span class="card-icon">🎯</span>
                </div>
                <div class="card-content">
                    <div class="percentage" id="fechamentoPerc">--%</div>
                    <div class="fraction" id="fechamentoFrac">--/--</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Repasse (Mês)</h3>
                    <span class="card-icon">💰</span>
                </div>
                <div class="card-content">
                    <div class="repasse-value" id="repasseValue">R$ --</div>
                    <div class="repasse-status" id="repasseStatus">--</div>
                    <div class="repasse-meta" id="repasseMeta">Meta: R$ --</div>
                </div>
            </div>
        </div>

        <div class="calendar-section">
            <div class="calendar-header">
                <h2 id="calendarTitle">Calendário - Agosto 2025</h2>
                <div class="calendar-legend">
                    <div class="legend-item">
                        <span class="legend-dot occupied"></span>
                        <span>Ocupado</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot empty"></span>
                        <span>Vazio</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot alert">🚨</span>
                        <span>3+ dias vazios</span>
                    </div>
                </div>
            </div>
            
            <div class="calendar-grid" id="calendarGrid">
                <!-- Calendar days will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip" style="display: none;">
        <div class="tooltip-content" id="tooltipContent"></div>
    </div>

    <script src="config.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
